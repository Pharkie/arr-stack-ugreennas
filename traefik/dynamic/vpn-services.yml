http:
  routers:
    homarr:
      rule: "Host(`homarr.yourdomain.com`)"
      entryPoints:
        - web
      service: homarr

    sonarr:
      rule: "Host(`sonarr.yourdomain.com`)"
      entryPoints:
        - web
      service: sonarr

    radarr:
      rule: "Host(`radarr.yourdomain.com`)"
      entryPoints:
        - web
      service: radarr

    qbittorrent:
      rule: "Host(`qbit.yourdomain.com`)"
      entryPoints:
        - web
      service: qbittorrent

    prowlarr:
      rule: "Host(`prowlarr.yourdomain.com`)"
      entryPoints:
        - web
      service: prowlarr

    jellyfin:
      rule: "Host(`jellyfin.yourdomain.com`)"
      entryPoints:
        - web
      service: jellyfin

    jellyseerr:
      rule: "Host(`jellyseerr.yourdomain.com`)"
      entryPoints:
        - web
      service: jellyseerr

    bazarr:
      rule: "Host(`bazarr.yourdomain.com`)"
      entryPoints:
        - web
      service: bazarr

    pihole:
      rule: "Host(`pihole.yourdomain.com`)"
      entryPoints:
        - web
      service: pihole

    wg:
      rule: "Host(`wg.yourdomain.com`)"
      entryPoints:
        - web
      service: wg

    traefik-dashboard:
      rule: "Host(`traefik.yourdomain.com`)"
      entryPoints:
        - web
      service: api@internal
      middlewares:
        - dashboard-auth

  middlewares:
    dashboard-auth:
      basicAuth:
        users:
          - "admin:$apr1$c8hfpRTf$q9JyOMTRUt2bp4XpBR94a."

